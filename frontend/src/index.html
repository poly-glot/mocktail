<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Mocktail — AI wireframes</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Lato:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <script>
      // Production Firebase Web App config. apiKey is a public identifier per
      // https://firebase.google.com/docs/projects/api-keys; security comes
      // from Firestore rules + App Check, not from hiding the key.
      window.__FIREBASE_API_KEY__ = 'AIzaSyBywd-f2cxvyWJQzOz6dIo9K_C_jXRuFzk';
      window.__FIREBASE_AUTH_DOMAIN__ = 'fir-cloud-491613.firebaseapp.com';
      window.__FIREBASE_PROJECT_ID__ = 'firebase-cloud-491613';
      window.__FIREBASE_APP_ID__ = '1:563789376070:web:10ea1e842552b494f07847';

      // Enable emulator-backed Firebase config when served from localhost or
      // from the Firebase hosting emulator (port 5000). Also enable when we're
      // inside the Angular dev server on 4200.
      (function () {
        var h = location.hostname;
        var p = location.port;
        if (
          h === 'localhost' ||
          h === '127.0.0.1' ||
          h === '0.0.0.0' ||
          p === '4200' ||
          p === '5000'
        ) {
          window.__MOCKTAIL_USE_EMULATORS__ = true;
        }
      })();
    </script>
  </head>
  <body>
    <mk-root></mk-root>
  </body>
</html>
