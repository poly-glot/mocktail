name: CI
on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_call:

jobs:
  frontend:
    name: Frontend (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --legacy-peer-deps
      - name: Lint (ESLint)
        run: npm run lint
      - name: Lint (Stylelint)
        run: npm run lint:scss
      - name: Format check
        run: npm run format:check
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests with coverage
        run: npm test -- --watch=false --code-coverage --browsers=ChromeHeadlessNoSandbox
      - name: Coverage ratchet
        run: node scripts/check-coverage.mjs
      - name: Circular deps (madge)
        run: npm run deps:check
      - name: Build (production)
        run: npm run build
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: frontend/coverage/
      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/mocktail/browser

  collab:
    name: Collab backend (Zig build + test)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend/collab
    steps:
      - uses: actions/checkout@v4
      - name: Install Zig 0.15.2
        run: |
          set -euo pipefail
          curl -sSL https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz | tar -xJ
          echo "$PWD/zig-x86_64-linux-0.15.2" >> "$GITHUB_PATH"
      - name: Install gRPC + protobuf-c
        run: |
          sudo apt-get update
          sudo apt-get install -y libgrpc-dev libprotobuf-c-dev protobuf-c-compiler
      - name: zig build
        run: zig build
      - name: zig build test
        run: zig build test

  email-auth:
    name: Email-auth (Deno check + test)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: backend/email-auth-service
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: deno check
        run: deno check main.ts
      - name: deno fmt --check
        run: deno fmt --check
      - name: deno lint
        run: deno lint
      - name: deno test
        run: deno test --allow-env --allow-net --allow-read
